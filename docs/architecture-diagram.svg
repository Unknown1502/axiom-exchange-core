<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 830" font-family="'Segoe UI', Inter, system-ui, sans-serif">
  <defs>
    <marker id="arrowAccent" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5b8cff"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#ff4d4d"/>
    </marker>
    <marker id="arrowMuted" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#8a8a9c"/>
    </marker>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="1000" height="830" fill="#0a0a0f"/>

  <!-- title -->
  <text x="500" y="42" text-anchor="middle" font-size="26" font-weight="700" fill="#e5e7eb">AXIOM — System Architecture</text>
  <text x="500" y="68" text-anchor="middle" font-size="13" fill="#8a8a9c">Exactly-once trade execution · Amazon Aurora DSQL + Amazon DynamoDB</text>

  <!-- legend (left) -->
  <g font-size="11" fill="#8a8a9c">
    <line x1="30" y1="360" x2="56" y2="360" stroke="#5b8cff" stroke-width="2" marker-end="url(#arrowAccent)"/>
    <text x="62" y="364">request / write path</text>
    <line x1="30" y1="384" x2="56" y2="384" stroke="#ff4d4d" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#arrowRed)"/>
    <text x="62" y="388">OCC conflict retry (40001)</text>
    <line x1="30" y1="408" x2="56" y2="408" stroke="#8a8a9c" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#arrowMuted)"/>
    <text x="62" y="412">audit firehose (async)</text>
  </g>

  <!-- VERCEL container -->
  <rect x="300" y="100" width="400" height="210" rx="12" fill="#0d0f1a" stroke="#5b8cff" stroke-dasharray="6 4" stroke-width="1.5"/>
  <text x="318" y="122" font-size="12" font-weight="700" fill="#5b8cff">VERCEL</text>

  <!-- UI box -->
  <rect x="330" y="132" width="340" height="66" rx="8" fill="#12121a" stroke="#23232f"/>
  <text x="500" y="160" text-anchor="middle" font-size="14" font-weight="700" fill="#e5e7eb">Order Entry UI</text>
  <text x="500" y="180" text-anchor="middle" font-size="10.5" fill="#8a8a9c">order book · trade tape · ledger · Knight Capital Mode</text>

  <!-- Next API routes box -->
  <rect x="330" y="224" width="340" height="66" rx="8" fill="#12121a" stroke="#23232f"/>
  <text x="500" y="252" text-anchor="middle" font-size="13" font-weight="700" fill="#e5e7eb">Next.js  /api/*  route handlers</text>
  <text x="500" y="272" text-anchor="middle" font-size="10.5" fill="#8a8a9c">same-origin proxy → INTAKE_API_URL</text>

  <!-- Intake API box -->
  <rect x="320" y="350" width="360" height="80" rx="8" fill="#12121a" stroke="#23232f"/>
  <text x="500" y="378" text-anchor="middle" font-size="14" font-weight="700" fill="#e5e7eb">Intake API — Fastify</text>
  <text x="500" y="398" text-anchor="middle" font-size="10.5" fill="#8a8a9c">region tag · idempotency-key · read projections</text>
  <text x="500" y="416" text-anchor="middle" font-size="10.5" fill="#8a8a9c">POST /orders · GET /book · /trades (SSE) · /events</text>

  <!-- Matching Engine box -->
  <rect x="350" y="470" width="300" height="86" rx="8" fill="#12121a" stroke="#5b8cff" stroke-width="1.5"/>
  <text x="500" y="500" text-anchor="middle" font-size="14" font-weight="700" fill="#e5e7eb">Matching Engine</text>
  <text x="500" y="520" text-anchor="middle" font-size="10.5" fill="#8a8a9c">price-time priority</text>
  <text x="500" y="540" text-anchor="middle" font-size="11" font-weight="700" fill="#00ff88">every trade in ONE OCC transaction</text>

  <!-- AWS container -->
  <rect x="210" y="596" width="620" height="200" rx="12" fill="#1a140a" stroke="#ff9900" stroke-dasharray="6 4" stroke-width="1.5"/>
  <text x="228" y="618" font-size="12" font-weight="700" fill="#ff9900">AWS · us-east-1</text>

  <!-- Aurora DSQL box -->
  <rect x="240" y="632" width="300" height="140" rx="8" fill="#12121a" stroke="#ff9900" stroke-width="1.5"/>
  <text x="390" y="660" text-anchor="middle" font-size="14" font-weight="700" fill="#e5e7eb">Amazon Aurora DSQL</text>
  <text x="390" y="682" text-anchor="middle" font-size="12" fill="#e5e7eb">order_book  +  trades</text>
  <text x="390" y="704" text-anchor="middle" font-size="10" font-weight="700" fill="#ff9900">SOURCE OF TRUTH</text>
  <text x="390" y="722" text-anchor="middle" font-size="10" fill="#00ff88">idempotency_key UNIQUE</text>
  <text x="390" y="740" text-anchor="middle" font-size="10" fill="#8a8a9c">REPEATABLE READ + OCC · no FK · CHECK qty ≥ 0</text>

  <!-- DynamoDB box -->
  <rect x="560" y="632" width="250" height="140" rx="8" fill="#12121a" stroke="#ff9900" stroke-width="1.5"/>
  <text x="685" y="660" text-anchor="middle" font-size="14" font-weight="700" fill="#e5e7eb">Amazon DynamoDB</text>
  <text x="685" y="682" text-anchor="middle" font-size="12" fill="#e5e7eb">order_events firehose</text>
  <text x="685" y="704" text-anchor="middle" font-size="10" fill="#8a8a9c">append-only audit log</text>
  <text x="685" y="722" text-anchor="middle" font-size="10" fill="#8a8a9c">PK symbol · SK timestamp#id</text>
  <text x="685" y="740" text-anchor="middle" font-size="10" fill="#8a8a9c">burst writes · no transaction</text>

  <!-- arrows: main flow -->
  <line x1="500" y1="198" x2="500" y2="222" stroke="#5b8cff" stroke-width="2" marker-end="url(#arrowAccent)"/>
  <line x1="500" y1="290" x2="500" y2="348" stroke="#5b8cff" stroke-width="2" marker-end="url(#arrowAccent)"/>
  <text x="512" y="322" font-size="10" fill="#8a8a9c">HTTPS</text>
  <line x1="500" y1="430" x2="500" y2="468" stroke="#5b8cff" stroke-width="2" marker-end="url(#arrowAccent)"/>
  <text x="512" y="452" font-size="10" fill="#8a8a9c">submitOrder()</text>
  <path d="M 480 556 C 440 590 420 600 405 630" fill="none" stroke="#5b8cff" stroke-width="2" marker-end="url(#arrowAccent)"/>
  <text x="300" y="598" font-size="10" fill="#8a8a9c">BEGIN … COMMIT</text>

  <!-- OCC retry loop -->
  <path d="M 300 632 C 205 600 205 545 348 545" fill="none" stroke="#ff4d4d" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#arrowRed)"/>
  <text x="170" y="585" text-anchor="middle" font-size="10" font-weight="700" fill="#ff4d4d">SQLSTATE 40001</text>
  <text x="170" y="599" text-anchor="middle" font-size="10" fill="#ff4d4d">conflict → retry</text>

  <!-- firehose async write -->
  <path d="M 680 392 C 770 440 775 560 690 630" fill="none" stroke="#8a8a9c" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#arrowMuted)"/>
  <text x="792" y="496" text-anchor="middle" font-size="10" fill="#8a8a9c">writeEvent()</text>
  <text x="792" y="510" text-anchor="middle" font-size="10" fill="#8a8a9c">fire-and-forget</text>

  <!-- footnote -->
  <text x="500" y="818" text-anchor="middle" font-size="11" font-weight="700" fill="#00ff88">Proven: 50 concurrent orders → 0 double-fills · 0 negative qty · hundreds of real OCC retries</text>
</svg>
