<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 940" font-family="'Segoe UI', Inter, system-ui, sans-serif">
  <defs>
    <marker id="aBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2563eb"/>
    </marker>
    <marker id="aGreen" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#16a34a"/>
    </marker>
    <marker id="aRed" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#dc2626"/>
    </marker>
    <marker id="aGray" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- canvas -->
  <rect x="0" y="0" width="1200" height="940" fill="#ffffff"/>

  <!-- title -->
  <text x="600" y="48" text-anchor="middle" font-size="26" font-weight="700" fill="#0f172a">AXIOM — System Architecture</text>
  <text x="600" y="74" text-anchor="middle" font-size="13" fill="#64748b">Distributed exchange core · exactly-once trade execution on Amazon Aurora DSQL + Amazon DynamoDB</text>

  <!-- ============ swimlane backgrounds ============ -->
  <!-- CLIENT lane -->
  <rect x="60" y="104" width="1080" height="96" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="82" y="130" font-size="11" font-weight="700" fill="#94a3b8" letter-spacing="1">CLIENT</text>
  <!-- EDGE / VERCEL lane -->
  <rect x="60" y="224" width="1080" height="96" rx="12" fill="#f5f8ff" stroke="#dbe6ff"/>
  <text x="82" y="250" font-size="11" font-weight="700" fill="#6b8af0" letter-spacing="1">EDGE · VERCEL</text>
  <!-- COMPUTE lane -->
  <rect x="60" y="344" width="1080" height="232" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="82" y="370" font-size="11" font-weight="700" fill="#94a3b8" letter-spacing="1">COMPUTE</text>
  <!-- DATA / AWS lane -->
  <rect x="60" y="600" width="1080" height="262" rx="12" fill="#fffaf2" stroke="#ffe2bf"/>
  <text x="82" y="626" font-size="11" font-weight="700" fill="#d97706" letter-spacing="1">DATA · AWS · us-east-1</text>

  <!-- ============ CLIENT: Order UI ============ -->
  <rect x="440" y="120" width="320" height="64" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.4"/>
  <text x="600" y="146" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">Order Entry UI · Next.js 15</text>
  <text x="600" y="166" text-anchor="middle" font-size="10.5" fill="#64748b">live book · trade tape · ledger · ▶ Knight Capital Mode</text>

  <!-- ============ EDGE: route handlers ============ -->
  <rect x="440" y="240" width="320" height="64" rx="10" fill="#ffffff" stroke="#93b0f7" stroke-width="1.4"/>
  <text x="600" y="266" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">Next.js /api/* route handlers</text>
  <text x="600" y="286" text-anchor="middle" font-size="10.5" fill="#64748b">same-origin proxy · forwards X-Region + idempotency-key</text>

  <!-- ============ COMPUTE: Intake API ============ -->
  <rect x="400" y="386" width="400" height="70" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.4"/>
  <text x="600" y="412" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">Intake API · Fastify 5</text>
  <text x="600" y="431" text-anchor="middle" font-size="10.5" fill="#64748b">region tagging · idempotency dedupe · read projections</text>
  <text x="600" y="447" text-anchor="middle" font-size="10.5" fill="#64748b">POST /orders · GET /book · /trades · /events</text>

  <!-- ============ COMPUTE: Matching Engine ============ -->
  <rect x="420" y="478" width="360" height="84" rx="10" fill="#ffffff" stroke="#2563eb" stroke-width="1.8"/>
  <text x="600" y="504" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">Matching Engine</text>
  <text x="600" y="523" text-anchor="middle" font-size="10.5" fill="#64748b">price-time priority · sole writer of the trades ledger</text>
  <rect x="470" y="534" width="260" height="22" rx="11" fill="#ecfdf3" stroke="#16a34a" stroke-width="1"/>
  <text x="600" y="549" text-anchor="middle" font-size="10.5" font-weight="700" fill="#15803d">every trade in ONE OCC transaction</text>

  <!-- ============ DATA: Aurora DSQL ============ -->
  <rect x="120" y="648" width="430" height="186" rx="10" fill="#ffffff" stroke="#d97706" stroke-width="1.6"/>
  <circle cx="158" cy="686" r="14" fill="none" stroke="#d97706" stroke-width="1.6"/>
  <path d="M158 676 a9 4.5 0 0 0 0 19 M158 676 a9 4.5 0 0 1 0 19 M149 686 h18" stroke="#d97706" stroke-width="1.3" fill="none"/>
  <text x="184" y="682" font-size="14.5" font-weight="700" fill="#0f172a">Amazon Aurora DSQL</text>
  <text x="184" y="701" font-size="11" fill="#475569">tables: order_book · trades</text>
  <rect x="140" y="716" width="124" height="20" rx="10" fill="#fff7ed" stroke="#d97706" stroke-width="0.8"/>
  <text x="202" y="730" text-anchor="middle" font-size="9.5" font-weight="700" fill="#b45309">SOURCE OF TRUTH</text>
  <text x="140" y="760" font-size="10.5" fill="#15803d" font-weight="600">✓ UNIQUE(idempotency_key) — duplicates can't execute</text>
  <text x="140" y="779" font-size="10.5" fill="#15803d" font-weight="600">✓ CHECK(quantity ≥ 0) — book can't go negative</text>
  <text x="140" y="800" font-size="10" fill="#64748b">REPEATABLE READ + OCC · no locks · no FK</text>
  <text x="140" y="819" font-size="10" fill="#64748b">multi-Region active-active: us-east-1 + us-east-2 · RPO 0</text>

  <!-- ============ DATA: DynamoDB ============ -->
  <rect x="650" y="648" width="430" height="186" rx="10" fill="#ffffff" stroke="#d97706" stroke-width="1.6"/>
  <path d="M682 678 h20 v20 h-20 z M682 688 h20 M692 678 v20" stroke="#2563eb" stroke-width="1.4" fill="none"/>
  <text x="716" y="682" font-size="14.5" font-weight="700" fill="#0f172a">Amazon DynamoDB</text>
  <text x="716" y="701" font-size="11" fill="#475569">table: order_events</text>
  <rect x="670" y="716" width="124" height="20" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="0.8"/>
  <text x="732" y="730" text-anchor="middle" font-size="9.5" font-weight="700" fill="#1d4ed8">AUDIT FIREHOSE</text>
  <text x="670" y="760" font-size="10.5" fill="#64748b">append-only event log · PK symbol · SK timestamp#order_id</text>
  <text x="670" y="779" font-size="10.5" fill="#64748b">absorbs write bursts · no cross-row transaction needed</text>
  <text x="670" y="800" font-size="10" fill="#94a3b8">fire-and-forget — never on the settlement critical path</text>

  <!-- ============ FLOWS ============ -->
  <!-- UI <-> routes -->
  <line x1="585" y1="184" x2="585" y2="238" stroke="#2563eb" stroke-width="2" marker-end="url(#aBlue)"/>
  <text x="575" y="214" text-anchor="end" font-size="10" fill="#64748b">HTTPS</text>
  <line x1="615" y1="240" x2="615" y2="186" stroke="#16a34a" stroke-width="1.8" stroke-dasharray="3 3" marker-end="url(#aGreen)"/>
  <text x="625" y="214" font-size="10" fill="#16a34a">JSON</text>

  <!-- routes <-> intake -->
  <line x1="585" y1="304" x2="585" y2="384" stroke="#2563eb" stroke-width="2" marker-end="url(#aBlue)"/>
  <line x1="615" y1="386" x2="615" y2="306" stroke="#16a34a" stroke-width="1.8" stroke-dasharray="3 3" marker-end="url(#aGreen)"/>

  <!-- intake -> engine -->
  <line x1="600" y1="456" x2="600" y2="476" stroke="#2563eb" stroke-width="2" marker-end="url(#aBlue)"/>
  <text x="610" y="471" font-size="10" fill="#64748b">submitOrder()</text>

  <!-- engine -> DSQL (down-left) -->
  <path d="M470 562 C 360 600 345 622 340 644" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#aBlue)"/>
  <text x="332" y="600" text-anchor="end" font-size="10" fill="#64748b">BEGIN…COMMIT</text>
  <!-- DSQL -> engine (committed read / ok) -->
  <path d="M408 644 C 430 620 455 600 520 564" fill="none" stroke="#16a34a" stroke-width="1.8" stroke-dasharray="3 3" marker-end="url(#aGreen)"/>

  <!-- OCC retry self-loop (kept inside COMPUTE lane, no overlap) -->
  <path d="M780 520 C 870 520 870 478 790 478" fill="none" stroke="#dc2626" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#aRed)"/>
  <text x="900" y="500" text-anchor="middle" font-size="10.5" font-weight="700" fill="#dc2626">SQLSTATE 40001</text>
  <text x="900" y="515" text-anchor="middle" font-size="10" fill="#ef4444">conflict → retry on fresh snapshot</text>

  <!-- intake -> DynamoDB firehose (down-right, async) -->
  <path d="M800 432 C 900 480 905 580 865 644" fill="none" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#aGray)"/>
  <text x="940" y="545" text-anchor="middle" font-size="10" fill="#64748b">writeEvent() · async</text>

  <!-- ============ LEGEND (top-right, inside CLIENT lane) ============ -->
  <g font-size="10.5">
    <rect x="820" y="116" width="300" height="76" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="836" y="134" font-size="10" font-weight="700" fill="#94a3b8" letter-spacing="0.5">LEGEND</text>
    <line x1="838" y1="150" x2="866" y2="150" stroke="#2563eb" stroke-width="2" marker-end="url(#aBlue)"/>
    <text x="874" y="154" fill="#475569">request / write path</text>
    <line x1="1000" y1="150" x2="1028" y2="150" stroke="#16a34a" stroke-width="1.8" stroke-dasharray="3 3" marker-end="url(#aGreen)"/>
    <text x="1036" y="154" fill="#475569">read / response</text>
    <line x1="838" y1="174" x2="866" y2="174" stroke="#dc2626" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#aRed)"/>
    <text x="874" y="178" fill="#475569">OCC retry (40001)</text>
    <line x1="1000" y1="174" x2="1028" y2="174" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#aGray)"/>
    <text x="1036" y="178" fill="#475569">audit firehose</text>
  </g>

  <!-- ============ footnote ============ -->
  <rect x="300" y="884" width="600" height="28" rx="14" fill="#ecfdf3" stroke="#16a34a" stroke-width="1"/>
  <text x="600" y="902" text-anchor="middle" font-size="11" font-weight="700" fill="#15803d">Proven: 50 concurrent orders → 0 double-fills · 0 negative qty · hundreds of real OCC retries</text>
</svg>
